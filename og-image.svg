<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0b1a"/>
      <stop offset="100%" stop-color="#1a1333"/>
    </linearGradient>
    <linearGradient id="ring-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid dots -->
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="0.8" fill="#ffffff" opacity="0.06"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Plasmid ring illustration (right side) -->
  <g transform="translate(880, 315)">
    <!-- Outer glow -->
    <circle cx="0" cy="0" r="170" fill="none" stroke="#6366f1" stroke-width="1" opacity="0.15"/>
    <circle cx="0" cy="0" r="200" fill="none" stroke="#6366f1" stroke-width="0.5" opacity="0.08"/>

    <!-- Main backbone -->
    <circle cx="0" cy="0" r="140" fill="none" stroke="#4b5563" stroke-width="6" opacity="0.4"/>

    <!-- Feature arcs -->
    <!-- Promoter (green, top-right) -->
    <path d="M 98.99 -98.99 A 140 140 0 0 1 140 0" fill="none" stroke="#22c55e" stroke-width="14" stroke-linecap="round"/>

    <!-- Gene (blue, right-bottom) -->
    <path d="M 140 0 A 140 140 0 0 1 0 140" fill="none" stroke="#6366f1" stroke-width="14" stroke-linecap="round"/>

    <!-- Resistance (amber, bottom-left) -->
    <path d="M -49.5 131 A 140 140 0 0 1 -140 0" fill="none" stroke="#f59e0b" stroke-width="14" stroke-linecap="round"/>

    <!-- Origin (red, top-left) -->
    <path d="M -121.24 -70 A 140 140 0 0 1 -70 -121.24" fill="none" stroke="#ef4444" stroke-width="14" stroke-linecap="round"/>

    <!-- Terminator (purple, top) -->
    <path d="M -35 -135.56 A 140 140 0 0 1 35 -135.56" fill="none" stroke="#a855f7" stroke-width="14" stroke-linecap="round"/>

    <!-- Inner tick marks -->
    <line x1="0" y1="-115" x2="0" y2="-125" stroke="#9ca3af" stroke-width="1.5" opacity="0.5"/>
    <line x1="115" y1="0" x2="125" y2="0" stroke="#9ca3af" stroke-width="1.5" opacity="0.5"/>
    <line x1="0" y1="115" x2="0" y2="125" stroke="#9ca3af" stroke-width="1.5" opacity="0.5"/>
    <line x1="-115" y1="0" x2="-125" y2="0" stroke="#9ca3af" stroke-width="1.5" opacity="0.5"/>
  </g>

  <!-- Text content (left side) -->
  <g transform="translate(80, 200)">
    <!-- Logo icon (matches favicon proportions) -->
    <circle cx="18" cy="18" r="14" fill="none" stroke="#6366f1" stroke-width="2.5"/>
    <path d="M11 18a7 7 0 0 1 14 0" fill="none" stroke="#6366f1" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="18" cy="18" r="2.9" fill="#6366f1"/>

    <!-- App name -->
    <text x="44" y="25" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="600" fill="#c7d2fe" letter-spacing="1">PlasmidStudio</text>

    <!-- Main title -->
    <text x="0" y="100" font-family="Inter, system-ui, sans-serif" font-size="56" font-weight="800" fill="#ffffff">Interactive Plasmid</text>
    <text x="0" y="165" font-family="Inter, system-ui, sans-serif" font-size="56" font-weight="800" fill="#ffffff">Map Editor</text>

    <!-- Subtitle -->
    <text x="0" y="220" font-family="Inter, system-ui, sans-serif" font-size="22" fill="#9ca3af">Design and export publication-ready plasmid maps</text>
    <text x="0" y="250" font-family="Inter, system-ui, sans-serif" font-size="22" fill="#9ca3af">in your browser. No signup required.</text>

    <!-- Tagline points -->
    <circle cx="12" cy="298" r="3.5" fill="#22c55e" opacity="0.8"/>
    <text x="24" y="303" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="500" fill="#9ca3af">Free &amp; open-source</text>

    <circle cx="212" cy="298" r="3.5" fill="#818cf8" opacity="0.8"/>
    <text x="224" y="303" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="500" fill="#9ca3af">Works offline</text>

    <circle cx="372" cy="298" r="3.5" fill="#f59e0b" opacity="0.8"/>
    <text x="384" y="303" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="500" fill="#9ca3af">GenBank &amp; SnapGene</text>
  </g>

  <!-- URL (bottom-right) -->
  <text x="1120" y="598" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="500" fill="#6366f1" text-anchor="end" opacity="0.7">plasmidstudio.app</text>

  <!-- Bottom accent line -->
  <rect x="0" y="622" width="1200" height="8" fill="url(#ring-grad)"/>
</svg>
